# This workflow builds the Go project and deploys it
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

# Disabled until server setup — manual trigger only.
# To re-enable auto-deploy, restore the push + schedule triggers below.
on:
  workflow_dispatch:
  # push:
  #   branches: ["main"]
  # schedule:
  #   # Monthly cert renewal check (runs 1st of every month at 4am)
  #   - cron: 0 4 1 * *

permissions:
  contents: write
  packages: write

jobs:
  run_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker Image
        run: |
          docker build -t sprint-tools:latest .

      - name: Push Docker Image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag sprint-tools:latest ghcr.io/${{ github.repository_owner }}/sprint-tools:latest
          docker push ghcr.io/${{ github.repository_owner }}/sprint-tools:latest

      - name: Deploy to Server
        uses: appleboy/scp-action@v1
        with:
          host: 46.101.95.175
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml"
          target: "/root/"

      - name: Pull latest Docker image and run Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: 46.101.95.175
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export CERT_PATH="${{ secrets.CERT_PATH }}"
            export KEY_PATH="${{ secrets.KEY_PATH }}"
            export ENV="production"
            export TURSO_DATABASE="${{ secrets.TURSO_DATABASE }}"
            docker compose pull
            docker compose down
            docker compose up -d
            sleep 5
            curl -f -k https://localhost:443 || exit 1

            docker image prune -a -f
